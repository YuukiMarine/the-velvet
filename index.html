<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- SEO 基础标签 -->
    <title>靛蓝色房间 - 个人成长追踪器</title>
    <meta name="description" content="一个帮助你追踪个人成长、管理属性升级、记录每日进度的应用。支持数据统计、任务管理、周目标设置等功能。" />
    <meta name="keywords" content="成长追踪,个人管理,属性升级,任务管理,日志记录" />
    <meta name="author" content="Velvet" />

    <!-- Open Graph（分享到社交媒体显示的内容） -->
    <meta property="og:title" content="靛蓝色房间 - 个人成长追踪器" />
    <meta property="og:description" content="一个帮助你追踪个人成长、管理属性升级、记录每日进度的应用。" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/pwa-512x512.png" />
    <meta property="og:url" content="https://the-velvet.com" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="靛蓝色房间" />
    <meta name="twitter:description" content="个人成长追踪器" />
    <meta name="twitter:image" content="/pwa-512x512.png" />

    <!-- iOS Safari 底部地址栏 / Android Chrome 顶部状态栏的着色。
         这里只设一个中性默认值（和 body bg 的浅色版本同色），
         真正的值在 App.tsx 里根据 settings.darkMode 动态写入，
         这样：(1) App 内手动切夜间模式能联动；(2) 不再被系统 prefers-color-scheme 裹挟。 -->
    <meta name="theme-color" content="#f9fafb" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- iOS 全屏 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Caveat 字体：非阻塞加载，网络不可用时自动降级到系统手写体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&display=swap" /></noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
