###############################################################
# 靛蓝色房间 — Nginx 部署配置
# 使用方式：将此文件复制到服务器，放入 /etc/nginx/sites-available/
# 然后 ln -s 到 sites-enabled/，再 nginx -t && systemctl reload nginx
###############################################################

server {
    listen 80;
    server_name the-velvet.com www.the-velvet.com;

    # HTTP 强制跳转 HTTPS（PWA Service Worker 必须在 HTTPS 下运行）
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name the-velvet.com www.the-velvet.com;

    # ---------- TLS ----------
    # 如使用 Let's Encrypt / Certbot，证书路径自动生成为以下格式：
    ssl_certificate     /etc/letsencrypt/live/the-velvet.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/the-velvet.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ---------- 站点根目录（指向构建产物 dist/）----------
    root /var/www/the-velvet/dist;
    index index.html;

    # ---------- Gzip 压缩 ----------
    gzip on;
    gzip_vary on;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        application/manifest+json
        image/svg+xml;
    gzip_min_length 1024;

    # ---------- MIME 类型补充 ----------
    # Nginx 默认不识别 .webmanifest，需手动声明
    types {
        application/manifest+json  webmanifest;
        audio/mpeg                 mp3;
    }

    # ---------- 缓存策略 ----------

    # Service Worker：绝对不能缓存，否则更新无法推送
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri =404;
    }

    # Workbox Runtime（sw.js 依赖的 workbox-*.js）：同上
    location ~* ^/workbox-.+\.js$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # index.html 与 manifest：不缓存，确保 PWA 更新能及时感知
    location ~* ^/(index\.html|manifest\.webmanifest)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri =404;
    }

    # Vite 构建产物（assets/）：文件名含 hash，永久缓存
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # 图标、音频等静态资源：适度缓存 7 天
    location ~* \.(png|ico|svg|mp3|wav)$ {
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # ---------- SPA 路由兜底（最重要！）----------
    # React 是单页应用，所有路径最终都要回到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------- 安全头 ----------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # HTTPS 强制（至少 1 年）
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}
